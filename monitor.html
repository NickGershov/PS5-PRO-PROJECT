<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/css/bootstrap.min.css"
        integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/icon?family=Material+Symbols+Outlined" rel="stylesheet">
    <link rel="stylesheet" href="./css/monitor.css">
    <link rel="stylesheet" href="./css/navbar.css">
    <title>Document</title>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-light nav-css">
        <span class="material-symbols-outlined icon-brand">water_drop</span>
        <a class="navbar-brand" href="index.html">EcoFlow Solutions</a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNavAltMarkup">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
            <div class="navbar-nav">
                <a id="monitor-nav" class="nav-item nav-link active " href="monitor.html" style="display: none;"><span
                        class="material-symbols-outlined"> monitor </span>Monitor</a>
                <a id="control-nav" class="nav-item nav-link nav-a-css" href="control.html" style="display: none;"><span
                        class="material-symbols-outlined"> valve </span> Controller </a>
                <a id="login-nav" class="nav-item nav-link" href="login.html" style="display: none;"><span
                        class="material-symbols-outlined"> login </span>Login </a>
                <a id="profile-nav" class="nav-item nav-link" href="profile.html" style="display: none;">
                    <span class="material-symbols-outlined"> person </span> Profile </a>
            </div>
        </div>
    </nav>


    <div class="sensor-container">
        <div class="sensor-header">
            <div class="badge">System Control</div>
            <h2>Sensor Readings</h2>
            <p>Real-time data from field sensors</p>
        </div>
        
        <div class="row">
            <div class="col-md-6 mb-3">
                <div class="sensor-box active" onclick="toggleActive(this)">
                    <div class="sensor-data">
                        <span id="temperature-icon" class="material-symbols-outlined icon-container"> device_thermostat</span>
                        <p id="temperature-data">Temperature: 0°C</p>
                    </div>
                </div>
            </div>
            <div class="col-md-6 mb-3">
                <div class="sensor-box" onclick="toggleActive(this)">
                    <div class="sensor-data">
                        <span id="humidity-icon" class="material-symbols-outlined icon-container"> humidity_mid </span>
                        <p id="humidity-data">Humidity: 40%</p>
                    </div>
                </div>
            </div>
            <div class="col-md-6 mb-3">
                <div class="sensor-box" onclick="toggleActive(this)">
                    <div class="sensor-data">
                        <span id="moisture-icon" class="material-symbols-outlined icon-container"> humidity_mid </span>
                        <p id="soil-moisture-data">Soil Moisture: 75%</p>
                    </div>
                </div>
            </div>
            <div class="col-md-6 mb-3">
                <div class="sensor-box" onclick="toggleActive(this)">
                    <div class="sensor-data">
                        <span id="light-icon" class="material-symbols-outlined icon-container"> lightbulb </span>
                        <p id="light-data">Light Detected</p>
                    </div>
                </div>
            </div>

        </div>
    </div>






    <div>
        <canvas id="myChart"></canvas>
      </div>
      
      <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>









    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
        integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.14.7/dist/umd/popper.min.js"
        integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/js/bootstrap.min.js"
        integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
        crossorigin="anonymous"></script>

    <script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-database-compat.js"></script>

    <script src="js/firebase_utils.js"></script>
    <script src="js/monitor.js"></script>

</body>

</html>
