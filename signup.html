<head>
  <meta charset="UTF-8">

  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
  <link href="https://fonts.googleapis.com/icon?family=Material+Symbols+Outlined" rel="stylesheet">
  <link rel="stylesheet" href="./css/signup.css">
  <link rel="stylesheet" href="./css/navbar.css">
  <title>Document</title>
</head>

<body>

  <nav class="navbar navbar-expand-lg navbar-light nav-css">
    <span class="material-symbols-outlined icon-brand">water_drop</span>
    <a class="navbar-brand" href="index.html">EcoFlow Solutions</a>
    <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNavAltMarkup">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
      <div class="navbar-nav">
        <a id="monitor-nav" class="nav-item nav-link" href="monitor.html" style="display: none;"><span
            class="material-symbols-outlined"> monitor </span>Monitor</a>
        <a id="control-nav" class="nav-item nav-link nav-a-css" href="control.html" style="display: none;"><span
            class="material-symbols-outlined"> valve </span> Controller </a>
        <a id="login-nav" class="nav-item nav-link" href="login.html" style="display: none;"><span
            class="material-symbols-outlined"> login </span>Login </a>
        <a id="profile-nav" class="nav-item nav-link" href="profile.html" style="display: none;">
          <span class="material-symbols-outlined"> person </span> Profile </a>
      </div>
    </div>
  </nav>



  <div class="container d-flex justify-content-center">
    <div class="signupDiv col-10 col-sm-8 col-md-6 col-lg-4">
      <div class="icon">
        <span class="material-symbols-outlined"> water_drop </span>
      </div>
      <h1>Create an account</h1>
      <p>Enter your information to get started</p>

      <form>
        <div class="form-row">
          <div class="form-group col-md-6">
            <label for="SignUpFirstName">First Name</label>
            <input type="text" class="form-control" id="SignUpFirstName" placeholder="Enter first name">
          </div>
          <div class="form-group col-md-6">
            <label for="SignUpLastName">Last Name</label>
            <input type="text" class="form-control" id="SignUpLastName" placeholder="Enter last name">
          </div>
        </div>
        <div class="form-group">
          <label for="SignUpUsername">Username</label>
          <input type="text" class="form-control" id="SignUpUsername" placeholder="Enter Username">
        </div>
        <div class="form-group">
          <label for="SignUpEmail">Email</label>
          <input type="email" class="form-control" id="SignUpEmail" placeholder="example@gmail.com">
        </div>
        <div class="form-group">
          <label for="SignUpPassword">Password</label>
          <input type="password" class="form-control" id="SignUpPassword" placeholder="···">
        </div>


        <div class="button-container">
          <button type="button" class="btn-block"
            onclick="signUp(SignUpFirstName.value, SignUpLastName.value, SignUpUsername.value, SignUpEmail.value, SignUpPassword.value)">Sign
            Up</button>
        </div>
      </form>
    </div>
  </div>


  

  <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
    integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
    crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/popper.js@1.14.7/dist/umd/popper.min.js"

    crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/js/bootstrap.min.js"
    integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
    crossorigin="anonymous"></script>

  <script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-database-compat.js"></script>
  <script src="js/firebase_utils.js"></script>
  <script src="js/signup.js"></script>
</body>

</html>
