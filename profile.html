<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/css/bootstrap.min.css"
        integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/icon?family=Material+Symbols+Outlined" rel="stylesheet">
    <link rel="stylesheet" href="./css/navbar.css">
    <link rel="stylesheet" href="./css/profile.css">
    <title>Profile Page</title>
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-light nav-css">
        <span class="material-symbols-outlined icon-brand">water_drop</span>
        <a class="navbar-brand" href="index.html">EcoFlow Solutions</a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNavAltMarkup">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
            <div class="navbar-nav">
                <a id="monitor-nav" class="nav-item nav-link" href="monitor.html" style="display: none;"><span
                        class="material-symbols-outlined"> monitor </span>Monitor</a>
                <a id="control-nav" class="nav-item nav-link nav-a-css" href="control.html" style="display: none;"><span
                        class="material-symbols-outlined"> valve </span> Controller </a>
                <a id="login-nav" class="nav-item nav-link" href="login.html" style="display: none;"><span
                        class="material-symbols-outlined"> login </span>Login </a>
                <a id="profile-nav" class="nav-item nav-link active" href="profile.html" style="display: none;">
                    <span class="material-symbols-outlined"> person </span> Profile </a>
            </div>
        </div>
    </nav>







    <div class="profile-container">
        <div class="page-header-container">
            <div class="page-header">
                <div class="badge">My Account</div>
                <h2>User Profile </h2>
                <p>Manage your plants, irrigation settings, and account preferences. </p>
            </div>
            <div class="logout-div">
                <button class="logout-btn" onclick="signOut()"><span class="material-symbols-outlined"> logout </span> Logout</button>
            </div>
        </div>


        <div class="profile-info">
            <h2><span class="material-symbols-outlined"> person </span> Account Information </h2>
            <p>Your personal details and preferences</p>
            <div class="profile-info-content">
                <div class="profile-info-fullname">
                    <p>Full name</p>
                    <p id="username"></p>
                </div>
                <div class="profile-info-email">
                    <p>Email Address</p>
                    <p id="email"></p>
                </div>
            </div>
        </div>
    </div>





















    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
        integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.14.7/dist/umd/popper.min.js"
        integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/js/bootstrap.min.js"
        integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
        crossorigin="anonymous"></script>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="js/firebase_utils.js"></script>
    <script src="js/profile.js"></script>

</body>

</html>
